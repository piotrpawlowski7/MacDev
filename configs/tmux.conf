# ============================================
# tmux configuration - Beautiful & Functional
# ============================================
# Catppuccin Mocha theme with ergonomic keybindings
# Designed for Claude Code + dev server workflows
# ============================================

# ===== General Settings =====

# True color & undercurl support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Enable mouse support (scrolling, pane selection, resizing)
set -g mouse on

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Faster key repetition
set -s escape-time 0

# Focus events (for vim/neovim integration)
set -g focus-events on

# Activity monitoring
setw -g monitor-activity off
set -g visual-activity off

# ===== Prefix Key =====
# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ===== Window & Pane Management =====

# Intuitive split keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows keep the current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation without prefix (Alt+arrow)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane navigation with vim keys (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation (Shift+arrow without prefix)
bind -n S-Left previous-window
bind -n S-Right next-window

# Swap windows (Ctrl+Shift+arrow)
bind -n C-S-Left swap-window -t -1\; select-window -t -1
bind -n C-S-Right swap-window -t +1\; select-window -t +1

# ===== Quick Actions =====

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Toggle zoom on current pane
bind z resize-pane -Z

# Kill pane without confirmation
bind x kill-pane

# Synchronize panes toggle (type in all panes at once)
bind S setw synchronize-panes

# ===== Copy Mode (vi-style) =====
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection

# Cross-platform clipboard: pbcopy on macOS, xclip on Linux
if-shell "uname | grep -q Darwin" {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
}

# ===== Catppuccin Theme (Mocha) =====

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Status bar position
set -g status-position bottom
set -g status-justify left

# Status bar style
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Status bar length
set -g status-left-length 40
set -g status-right-length 80

# Left status: session name
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#89b4fa] "

# Right status: git branch, date, time
set -g status-right "#[fg=#45475a]#[bg=#45475a,fg=#cdd6f4]  %b %d #[bg=#585b70,fg=#cdd6f4,bold]  %H:%M "

# Window status (inactive)
setw -g window-status-format "#[fg=#45475a,bg=#1e1e2e]#[fg=#6c7086,bg=#45475a] #I  #W #[fg=#45475a,bg=#1e1e2e]"

# Window status (active)
setw -g window-status-current-format "#[fg=#f5c2e7,bg=#1e1e2e]#[fg=#1e1e2e,bg=#f5c2e7,bold] #I  #W #[fg=#f5c2e7,bg=#1e1e2e]"

# Window separator
setw -g window-status-separator ""

# Message style
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Clock mode
setw -g clock-mode-colour "#89b4fa"

# ===== Plugins (via TPM) =====

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence (survive restarts)
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Better copy/paste
set -g @plugin 'tmux-plugins/tmux-yank'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
